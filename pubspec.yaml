name: flutter_application_2
description: "allofoods - Application de livraison de repas"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_maps_flutter: ^2.6.1
  google_maps_flutter_android: ^2.0.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0
  kkiapay_flutter_sdk: ^1.3.4
  image_picker: ^1.2.1
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4
  shared_preferences: ^2.5.4
  http: ^1.2.0
  flutter_svg: ^2.0.10+1
  intl: any
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  firebase_storage: ^13.1.0
  google_sign_in: ^7.2.0        # ← NOUVEAU — connexion Google
  flutter_dotenv: ^6.0.0
  firebase_messaging: ^16.1.3
  cloud_functions: ^6.2.0
  supabase_flutter: ^2.12.4
  url_launcher: ^6.2.0
  flutter_local_notifications: ^21.0.0
  path_provider: ^2.1.5
  photo_view: ^0.15.0
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  webview_flutter: ^4.8.0
  share_plus: ^10.1.4
  flutter_riverpod: ^3.3.1
  pdf: ^3.10.8
  printing: ^5.12.0
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins/Poppins-Bold.ttf
          weight: 700

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/logo.png
  android_12:
    image: assets/images/logo.png
    color: "#ffffff"
  fullscreen: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo.png"