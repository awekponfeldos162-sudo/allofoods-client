name: flutter_application_2
description: "allofoods - Application de livraison de repas"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # UI & État
  provider: ^6.1.2

  # Carte & Localisation
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0

  # Géocodage inverse (coords → adresse lisible)
  geocoding: ^3.0.0

  # Paiement
  kkiapay_flutter_sdk: ^1.3.4

  # Images & Profil
  image_picker: ^1.2.1

  # Splash & Icônes
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4

  # Stockage local
  shared_preferences: ^2.5.4

  # Divers
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/logo.png
  android_12:
    image: assets/images/logo.png
    color: "#ffffff"
  fullscreen: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo.png"
analyzer:
  errors:
    dead_code: ignore
